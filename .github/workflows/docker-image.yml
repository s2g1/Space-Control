name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Authetication with Google cloud
      uses: google-github-actions/auth@main
      with:
        project_id: ${{secrets.GCP_PROJECT_ID}}:latest
        workload_identity_provider: #need to look this up

    # Need another action to log into the registry

    - name: Build and push the visualization 
      uses: docker/build-push-action@master
      with:
        context: ./services/visualization
        push: true
        tags: ${{secrets.GCP_ARTIFACT_REGISTRY}}:latest

    - name: Build and push the control screen
      uses: docker/build-push-action@master
      with:
        context: ./services/mobile control screen
        push: true
        tags: ${{secrets.GCP_ARTIFACT_REGISTRY}}:latest
